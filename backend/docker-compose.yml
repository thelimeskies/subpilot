x-backend-environment: &backend-environment
  DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.local}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY is required}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,web}
  DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-0}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://app.subpilot.kylodo.com,https://portal.subpilot.kylodo.com,https://platform-admin.subpilot.kylodo.com}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://api.subpilot.kylodo.com,https://app.subpilot.kylodo.com,https://portal.subpilot.kylodo.com,https://platform-admin.subpilot.kylodo.com}
  FRONTEND_MERCHANT_URL: ${FRONTEND_MERCHANT_URL:-https://app.subpilot.kylodo.com}
  FRONTEND_CUSTOMER_URL: ${FRONTEND_CUSTOMER_URL:-https://portal.subpilot.kylodo.com}
  FRONTEND_PLATFORM_URL: ${FRONTEND_PLATFORM_URL:-https://platform-admin.subpilot.kylodo.com}
  POSTGRES_DB: ${POSTGRES_DB:-subpilot}
  POSTGRES_USER: ${POSTGRES_USER:-subpilot}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
  POSTGRES_HOST: ${POSTGRES_HOST:-db}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
  DJANGO_EMAIL_BACKEND: ${DJANGO_EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
  EMAIL_HOST: ${EMAIL_HOST:-mailpit}
  EMAIL_PORT: ${EMAIL_PORT:-1025}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
  EMAIL_USE_TLS: ${EMAIL_USE_TLS:-0}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-SubPilot <no-reply@subpilot.test>}
  FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:?FIELD_ENCRYPTION_KEY is required}
  NOMBA_SANDBOX_BASE_URL: ${NOMBA_SANDBOX_BASE_URL:-https://sandbox.nomba.com}
  NOMBA_LIVE_BASE_URL: ${NOMBA_LIVE_BASE_URL:-https://api.nomba.com}
  NOMBA_PLATFORM_TEST_ACCOUNT_ID: ${NOMBA_PLATFORM_TEST_ACCOUNT_ID:-}
  NOMBA_PLATFORM_TEST_SUB_ACCOUNT_ID: ${NOMBA_PLATFORM_TEST_SUB_ACCOUNT_ID:-}
  NOMBA_PLATFORM_TEST_CLIENT_ID: ${NOMBA_PLATFORM_TEST_CLIENT_ID:-}
  NOMBA_PLATFORM_TEST_CLIENT_SECRET: ${NOMBA_PLATFORM_TEST_CLIENT_SECRET:-}
  NOMBA_PLATFORM_LIVE_ACCOUNT_ID: ${NOMBA_PLATFORM_LIVE_ACCOUNT_ID:-}
  NOMBA_PLATFORM_LIVE_SUB_ACCOUNT_ID: ${NOMBA_PLATFORM_LIVE_SUB_ACCOUNT_ID:-}
  NOMBA_PLATFORM_LIVE_CLIENT_ID: ${NOMBA_PLATFORM_LIVE_CLIENT_ID:-}
  NOMBA_PLATFORM_LIVE_CLIENT_SECRET: ${NOMBA_PLATFORM_LIVE_CLIENT_SECRET:-}
  NOMBA_HTTP_USER_AGENT: ${NOMBA_HTTP_USER_AGENT:-SubPilot/0.1 (+https://subpilot.kylodo.com; nomba-api-client)}
  NOMBA_WEBHOOK_SECRET: ${NOMBA_WEBHOOK_SECRET:-}
  PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL:-admin@example.test}
  PLATFORM_ADMIN_PASSWORD: ${PLATFORM_ADMIN_PASSWORD:-}
  DEMO_MFA_BYPASS_CODE: ${DEMO_MFA_BYPASS_CODE:-}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-subpilot}
      POSTGRES_USER: ${POSTGRES_USER:-subpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - subpilot_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-subpilot} -d ${POSTGRES_DB:-subpilot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest

  migrate:
    build: .
    command: python manage.py migrate --noinput
    environment: *backend-environment
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  collectstatic:
    build: .
    user: root
    command: sh -c "mkdir -p /app/staticfiles && chown -R app:app /app/staticfiles && su app -c 'python manage.py collectstatic --clear --noinput'"
    environment: *backend-environment
    volumes:
      - .:/app
      - subpilot_staticfiles:/app/staticfiles

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    environment: *backend-environment
    volumes:
      - .:/app
      - subpilot_staticfiles:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      collectstatic:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started

  worker:
    build: .
    command: celery -A config worker -Q billing,payments,dunning,webhooks,notifications,analytics -l info
    environment: *backend-environment
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment: *backend-environment
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  subpilot_db_data:
  subpilot_staticfiles:

networks:
  default:
    name: dokploy-network
    external: true
