<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light only">
    <meta name="supported-color-schemes" content="light">
    <title>{% block title %}SubPilot{% endblock %}</title>
  </head>
  <body style="margin:0; padding:0; background:#F4F6FA; color:#0B1720; font-family:Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; -webkit-font-smoothing:antialiased;">
    <div style="display:none; max-height:0; overflow:hidden; opacity:0; color:transparent;">
      {{ preview_text|default:"SubPilot" }}
    </div>
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background:#F4F6FA;">
      <tr>
        <td align="center" style="padding:48px 16px;">
          <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="width:100%; max-width:560px;">
            <tr>
              <td style="padding:0 4px 20px 4px;">
                {% if logo_url %}
                  <img src="{{ logo_url }}" alt="{{ merchant_name|default:'SubPilot' }}" height="28" style="display:block; max-height:28px;">
                {% else %}
                  <span style="display:inline-block; padding:6px 14px; border-radius:999px; background:#0B1720; color:#FFFFFF; font-size:12px; font-weight:700; letter-spacing:0.04em;">{{ merchant_name|default:"SubPilot" }}</span>
                {% endif %}
              </td>
            </tr>
            <tr>
              <td style="background:#FFFFFF; border-radius:16px; box-shadow:0 1px 3px rgba(11, 23, 32, 0.06); padding:40px;">
                {% block content %}{% endblock %}
              </td>
            </tr>
            <tr>
              <td style="padding:24px 8px 0 8px; color:#9CA3AF; font-size:12px; line-height:18px; text-align:center;">
                Need help? <a href="mailto:{{ support_email }}" style="color:#0F766E; text-decoration:none;">{{ support_email }}</a>
                <br>
                SubPilot &copy; {{ current_year }} &middot; Subscription operations
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
