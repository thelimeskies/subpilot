  <text x="1110" y="312" fill="#0B1720" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850">Pro</text>
  <text x="1110" y="354" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850">NGN 15,000 / month</text>
  <text x="1110" y="394" fill="#52615D" font-family="Inter, Arial, sans-serif" font-size="16">14-day trial</text>
  <text x="1110" y="426" fill="#52615D" font-family="Inter, Arial, sans-serif" font-size="16">10 seats · Reports · API access</text>
  <text x="1080" y="544" fill="#52615D" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="850">DUNNING POLICY</text>
  <text x="1080" y="582" fill="#0B1720" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Default SaaS Recovery</text>
