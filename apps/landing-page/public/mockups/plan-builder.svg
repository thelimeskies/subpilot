  <text x="104" y="648" fill="#C9D8D3" font-family="Inter, Arial, sans-serif" font-size="17">8 Review</text>
  <rect x="392" y="168" width="620" height="724" rx="24" fill="#FFFFFF" stroke="#D8E7E1"/>
  <text x="432" y="220" fill="#0B1720" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="850">Pricing and billing</text>
