<svg width="1440" height="980" viewBox="0 0 1440 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SubPilot Plan Builder Mockup</title>
  <desc id="desc">High-fidelity plan builder mockup for pricing, billing cycle, trial, dunning, and Nomba checkout settings.</desc>
  <rect width="1440" height="980" fill="#F8FAF9"/>
