  <rect x="696" y="400" width="246" height="54" rx="14" fill="#F8FAF9" stroke="#D8E7E1"/>
  <text x="720" y="434" fill="#0B1720" font-family="Inter, Arial, sans-serif" font-size="17">Every 1 month</text>
  <text x="432" y="496" fill="#52615D" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">TRIAL AND SETUP</text>
  <rect x="432" y="514" width="240" height="54" rx="14" fill="#F8FAF9" stroke="#D8E7E1"/>
  <text x="456" y="548" fill="#0B1720" font-family="Inter, Arial, sans-serif" font-size="17">14 trial days</text>
  <rect x="696" y="514" width="246" height="54" rx="14" fill="#F8FAF9" stroke="#D8E7E1"/>
  <text x="720" y="548" fill="#0B1720" font-family="Inter, Arial, sans-serif" font-size="17">No setup fee</text>
