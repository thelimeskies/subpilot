  <text x="72" y="122" fill="#52615D" font-family="Inter, Arial, sans-serif" font-size="18">Define pricing, billing cycle, entitlements, dunning, and Nomba checkout behavior.</text>
  <rect x="72" y="168" width="280" height="724" rx="24" fill="#0B1720"/>
